<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ma Maison">
<meta name="theme-color" content="#1a1a2e">
<title>Ma Maison</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f1a;
  --bg2:#1a1a2e;
  --bg3:#22223b;
  --surface:#2a2a45;
  --border:#3a3a5c;
  --text:#f0f0f8;
  --text2:#9090b8;
  --text3:#5a5a7a;
  --purple:#7c6ff7;
  --purple-l:#a89cf8;
  --teal:#2dd4a0;
  --teal-l:#6ee8c4;
  --coral:#f07050;
  --coral-l:#f5a08a;
  --amber:#f0b429;
  --amber-l:#f8d080;
  --blue:#60a5fa;
  --pink:#f472b6;
  --r:14px;
  --r2:10px;
  --font:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}
.app{padding-bottom:90px;}

/* HEADER */
.header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start;}
.header-left h1{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;background:linear-gradient(135deg,var(--text) 0%,var(--purple-l) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-left .date{font-size:12px;color:var(--text2);margin-top:3px;letter-spacing:0.03em;}
.score-pill{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--purple-l);}

/* NAV */
.nav{display:flex;gap:6px;padding:16px 16px 0;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.navbtn{flex-shrink:0;padding:8px 16px;border-radius:99px;border:1px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:all 0.2s;font-family:var(--font);}
.navbtn.on{border-color:transparent;color:#fff;}

/* SECTIONS */
.section{display:none;padding:16px;}
.section.on{display:block;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;}
.stat-num{font-size:26px;font-weight:600;}

/* PROGRESS */
.prog-bg{height:5px;border-radius:3px;background:var(--bg3);margin:8px 0 4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.prog-lbl{font-size:11px;color:var(--text2);}

/* TASK ROWS */
.day-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 6px 2px;}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.2s;}
.task-row:last-child{border-bottom:none;padding-bottom:0;}
.task-row:active{opacity:0.7;}
.task-row.done .task-text{text-decoration:line-through;color:var(--text3);}
.check{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.check.on{border-color:transparent;}
.check svg{display:none;}
.check.on svg{display:block;}
.task-body{flex:1;}
.task-text{font-size:13px;color:var(--text);line-height:1.5;}
.task-days{font-size:11px;color:var(--text3);margin-top:2px;}
.who-badge{font-size:11px;padding:3px 9px;border-radius:99px;flex-shrink:0;margin-top:2px;font-weight:500;}

/* PERSONS */
.person-pill{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);margin-bottom:8px;cursor:pointer;border:1.5px solid var(--border);transition:all 0.2s;background:var(--surface);}
.person-pill.sel{border-width:2px;}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.person-name{font-size:14px;font-weight:500;}
.person-sub{font-size:12px;color:var(--text2);}

/* SORT / PHASES */
.phase-badge{display:inline-flex;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;margin-bottom:10px;}

/* EDIT */
.edit-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.edit-row input, .edit-row select{background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:7px 10px;font-family:var(--font);}
.edit-row input{flex:2;}
.edit-row select{flex:1;}
.btn-del{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font);}
.btn-add{width:100%;padding:10px;border-radius:var(--r2);border:1px dashed var(--border);font-size:13px;cursor:pointer;background:transparent;color:var(--text2);margin-top:6px;transition:all 0.2s;font-family:var(--font);}
.btn-add:hover{background:var(--bg3);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,15,26,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:10px 8px 20px;gap:4px;z-index:100;}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:12px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-size:10px;font-family:var(--font);transition:all 0.2s;}
.bnav.on{color:#fff;background:var(--surface);}
.bnav-icon{font-size:18px;}

/* ONLINE BADGE */
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ADD SECTION */
.add-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:10px;}
.add-section h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text);}
.form-row{margin-bottom:8px;}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;}
.form-row input,.form-row select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;font-family:var(--font);}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day-toggle{padding:6px 0;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:var(--font);transition:all 0.15s;text-align:center;}
.day-toggle.on{border-color:var(--purple);background:rgba(124,111,247,0.2);color:var(--purple-l);}
.btn-submit{width:100%;padding:11px;border-radius:var(--r2);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:6px;background:var(--purple);color:#fff;transition:all 0.2s;}
.btn-submit:hover{background:var(--purple-l);}

.syncing{font-size:11px;color:var(--text3);margin-top:6px;text-align:center;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="header-left">
      <h1>Ma Maison</h1>
      <div class="date" id="topdate"></div>
    </div>
    <div class="score-pill" id="top-score">0/0 ✓</div>
  </div>

  <div class="nav" id="main-nav">
    <button class="navbtn on" id="nav-aujourd" onclick="goTab('aujourd')">Aujourd'hui</button>
    <button class="navbtn" id="nav-semaine" onclick="goTab('semaine')">Semaine</button>
    <button class="navbtn" id="nav-personnes" onclick="goTab('personnes')">Par personne</button>
    <button class="navbtn" id="nav-tri" onclick="goTab('tri')">Désencombrement</button>
    <button class="navbtn" id="nav-edit" onclick="goTab('edit')">Modifier</button>
  </div>

  <div class="section on" id="tab-aujourd"></div>
  <div class="section" id="tab-semaine"></div>
  <div class="section" id="tab-personnes"></div>
  <div class="section" id="tab-tri"></div>
  <div class="section" id="tab-edit"></div>
</div>

<div class="bottom-nav">
  <button class="bnav on" id="bn-aujourd" onclick="goTab('aujourd')"><span class="bnav-icon">☀️</span>Aujourd'hui</button>
  <button class="bnav" id="bn-semaine" onclick="goTab('semaine')"><span class="bnav-icon">📅</span>Semaine</button>
  <button class="bnav" id="bn-personnes" onclick="goTab('personnes')"><span class="bnav-icon">👨‍👩‍👧‍👦</span>Famille</button>
  <button class="bnav" id="bn-tri" onclick="goTab('tri')"><span class="bnav-icon">📦</span>Tri</button>
  <button class="bnav" id="bn-edit" onclick="goTab('edit')"><span class="bnav-icon">✏️</span>Modifier</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyArP6dc0N3j_EC3cnTndYh4KCuX2txet7Q",
  authDomain: "mamaison-bf7b6.firebaseapp.com",
  databaseURL: "https://mamaison-bf7b6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mamaison-bf7b6",
  storageBucket: "mamaison-bf7b6.firebasestorage.app",
  messagingSenderId: "531996720785",
  appId: "1:531996720785:web:4a8eccefb56f34b6e70930"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const PEOPLE = [
  {id:'p1',name:'Parent 1',initials:'P1',color:'#60a5fa',bg:'rgba(96,165,250,0.15)'},
  {id:'p2',name:'Parent 2',initials:'P2',color:'#a89cf8',bg:'rgba(168,156,248,0.15)'},
  {id:'a17',name:'17 ans',initials:'17',color:'#2dd4a0',bg:'rgba(45,212,160,0.15)'},
  {id:'a14',name:'14 ans',initials:'14',color:'#f0b429',bg:'rgba(240,180,41,0.15)'},
  {id:'tous',name:'Tous',initials:'⊕',color:'#9090b8',bg:'rgba(144,144,184,0.15)'},
];
const DAYS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const TYPE_COLORS = {instant:'#2dd4a0',weekly:'#60a5fa',deep:'#a89cf8',sort:'#f07050'};
const TYPE_LABELS = {instant:'Geste immédiat',weekly:'Régulier',deep:'Nettoyage profond',sort:'Tri / désencombrement'};
const NAV_COLORS = {aujourd:'#7c6ff7',semaine:'#60a5fa',personnes:'#2dd4a0',tri:'#f07050',edit:'#9090b8'};

let tasks = [
  {id:1,text:'Lavabo SdB essuyé après passage',who:'tous',type:'instant',days:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim']},
  {id:2,text:'Lit fait avant de partir',who:'tous',type:'instant',days:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim']},
  {id:3,text:'Cuisine essuyée + vaisselle rangée',who:'tous',type:'instant',days:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim']},
  {id:4,text:'Aspirateur salon (alternance)',who:'a14',type:'weekly',days:['Lun','Mar','Mer']},
  {id:5,text:'WC haut + bas nettoyés',who:'a17',type:'weekly',days:['Ven']},
  {id:6,text:'Machine à laver lancée',who:'p1',type:'weekly',days:['Jeu','Ven']},
  {id:7,text:'15 min de tri dans 1 zone',who:'tous',type:'sort',days:['Ven']},
  {id:8,text:'Nettoyage SdB complet',who:'p1',type:'deep',days:['Sam']},
  {id:9,text:'Tri ciblé de la semaine (45 min)',who:'tous',type:'sort',days:['Sam']},
  {id:10,text:'Aspiration + lavage sols salon/cuisine',who:'a14',type:'weekly',days:['Sam']},
  {id:11,text:'Cuisine : nettoyage profond',who:'p1',type:'deep',days:['Sam']},
  {id:12,text:'Chambres enfants : tri personnel',who:'a14',type:'sort',days:['Sam']},
  {id:13,text:'Grande chambre nettoyage + tri',who:'p2',type:'deep',days:['Dim']},
  {id:14,text:'Linge plié et rangé',who:'tous',type:'weekly',days:['Dim']},
  {id:15,text:'1 boîte remplie pour donner/jeter',who:'tous',type:'sort',days:['Dim']},
  {id:16,text:'Poussière surfaces salons',who:'a17',type:'weekly',days:['Sam']},
  {id:17,text:'Sol balayé cuisine',who:'a14',type:'instant',days:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim']},
  {id:18,text:'Chambre 17 ans aspirée',who:'a17',type:'weekly',days:['Sam']},
  {id:19,text:'Chambre 14 ans aspirée',who:'a14',type:'weekly',days:['Sam']},
];

let sortZones = [
  {id:'s1',week:1,phase:1,name:'Buanderie — tout vider et décider'},
  {id:'s2',week:1,phase:1,name:'Cuisine : placards doublons et périmés'},
  {id:'s3',week:2,phase:1,name:'Salons : meubles déco, livres jamais lus'},
  {id:'s4',week:2,phase:1,name:'Entrée : chaussures, manteaux, sacs'},
  {id:'s5',week:3,phase:2,name:'Vêtements — chacun trie les siens'},
  {id:'s6',week:4,phase:2,name:'Papiers : classement et tri'},
  {id:'s7',week:5,phase:2,name:'Câbles, électronique, gadgets oubliés'},
  {id:'s8',week:5,phase:2,name:'SdB : produits périmés, doublons cosmétiques'},
  {id:'s9',week:6,phase:3,name:'Tour final cuisine : chaque tiroir défini'},
  {id:'s10',week:7,phase:3,name:'Tour final chambres : chaque étagère définie'},
  {id:'s11',week:8,phase:3,name:'Règle 1 in/1 out : ancrage définitif'},
];

let checked = {};
let sortDone = {};
let viewPerson = 'p1';
let selectedDays = [];
let currentTab = 'aujourd';

// Firebase sync
onValue(ref(db,'checked'), snap => { checked = snap.val()||{}; renderCurrent(); });
onValue(ref(db,'sortDone'), snap => { sortDone = snap.val()||{}; if(currentTab==='tri')renderTri(); });
onValue(ref(db,'tasks'), snap => { if(snap.val()){tasks=snap.val();} renderCurrent(); });

function syncChecked(key, val){
  update(ref(db,'checked'), {[key]:val});
}
function syncSortDone(key, val){
  update(ref(db,'sortDone'), {[key]:val});
}
function syncTasks(){
  set(ref(db,'tasks'), tasks);
}

function getPerson(id){return PEOPLE.find(p=>p.id===id)||PEOPLE[4];}

function whoBadge(who){
  const p=getPerson(who);
  return `<span class="who-badge" style="background:${p.bg};color:${p.color};">${p.name}</span>`;
}

function getTodayDay(){
  const d=new Date();
  return DAYS[d.getDay()===0?6:d.getDay()-1];
}

function renderCurrent(){
  if(currentTab==='aujourd')renderToday();
  else if(currentTab==='semaine')renderSemaine();
  else if(currentTab==='personnes')renderPersonnes();
}

function renderToday(){
  const day=getTodayDay();
  const todayTasks=tasks.filter(t=>t.days&&t.days.includes(day));
  const done=todayTasks.filter(t=>checked[day+'-'+t.id]).length;
  const pct=todayTasks.length?Math.round(done/todayTasks.length*100):0;

  let html=`<div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Tâches</div><div class="stat-num" style="color:var(--purple-l)">${todayTasks.length}</div></div>
    <div class="stat"><div class="stat-lbl">Complétées</div><div class="stat-num" style="color:var(--teal)">${done}</div></div>
  </div>
  <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--purple),var(--teal));"></div></div>
  <div class="prog-lbl">${pct}% — <span class="online-dot"></span>synchro famille active</div>`;

  const byType={};
  todayTasks.forEach(t=>{if(!byType[t.type])byType[t.type]=[];byType[t.type].push(t);});
  ['instant','weekly','sort','deep'].forEach(type=>{
    if(!byType[type])return;
    html+=`<div class="day-lbl">${TYPE_LABELS[type]}</div><div class="card">`;
    byType[type].forEach(t=>{
      const key=day+'-'+t.id;
      const isDone=!!checked[key];
      html+=`<div class="task-row${isDone?' done':''}" onclick="window.toggle('${key}')">
        <div class="check${isDone?' on':''}" style="${isDone?'background:'+TYPE_COLORS[type]+';':''}">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="task-body"><div class="task-text">${t.text}</div></div>
        ${whoBadge(t.who)}
      </div>`;
    });
    html+='</div>';
  });
  if(!todayTasks.length)html+=`<div style="text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;">Aucune tâche pour aujourd'hui 🎉</div>`;
  document.getElementById('tab-aujourd').innerHTML=html;
  document.getElementById('top-score').textContent=done+'/'+todayTasks.length+' ✓';
}

function renderSemaine(){
  let html='';
  DAYS.forEach(day=>{
    const dt=tasks.filter(t=>t.days&&t.days.includes(day));
    if(!dt.length)return;
    const done=dt.filter(t=>checked[day+'-'+t.id]).length;
    const pct=Math.round(done/dt.length*100);
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:14px;font-weight:600;">${day}</span>
        <span style="font-size:12px;color:var(--text2);">${done}/${dt.length}</span>
      </div>
      <div class="prog-bg" style="margin-top:0;"><div class="prog-fill" style="width:${pct}%;background:var(--blue);"></div></div>`;
    dt.forEach(t=>{
      const key=day+'-'+t.id;
      const isDone=!!checked[key];
      html+=`<div class="task-row${isDone?' done':''}" onclick="window.toggle('${key}')">
        <div class="check${isDone?' on':''}" style="${isDone?'background:'+TYPE_COLORS[t.type]+';':''}">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="task-text">${t.text}</div>
        ${whoBadge(t.who)}
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('tab-semaine').innerHTML=html;
}

function renderPersonnes(){
  let html='<div style="margin-bottom:12px;">';
  PEOPLE.forEach(p=>{
    const count=tasks.filter(t=>t.who===p.id).length;
    const isSel=viewPerson===p.id;
    html+=`<div class="person-pill${isSel?' sel':''}" onclick="window.setVP('${p.id}')" style="${isSel?'border-color:'+p.color+';background:'+p.bg+';':''}">
      <div class="avatar" style="background:${p.bg};color:${p.color};">${p.initials}</div>
      <div><div class="person-name">${p.name}</div><div class="person-sub">${count} tâche${count>1?'s':''} assignée${count>1?'s':''}</div></div>
    </div>`;
  });
  html+='</div>';
  const p=getPerson(viewPerson);
  const myTasks=tasks.filter(t=>t.who===viewPerson);
  html+=`<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;padding-left:2px;">Tâches de ${p.name}</div>`;
  if(!myTasks.length){html+=`<div style="color:var(--text2);font-size:13px;padding:16px 0;">Aucune tâche assignée</div>`;}
  else{
    const byType={};
    myTasks.forEach(t=>{if(!byType[t.type])byType[t.type]=[];byType[t.type].push(t);});
    ['instant','weekly','sort','deep'].forEach(type=>{
      if(!byType[type])return;
      html+=`<div class="day-lbl">${TYPE_LABELS[type]}</div><div class="card">`;
      byType[type].forEach(t=>{
        html+=`<div class="task-row">
          <div style="width:8px;height:8px;border-radius:50%;background:${TYPE_COLORS[type]};flex-shrink:0;margin-top:5px;"></div>
          <div class="task-body"><div class="task-text">${t.text}</div><div class="task-days">${t.days.join(', ')}</div></div>
        </div>`;
      });
      html+='</div>';
    });
  }
  document.getElementById('tab-personnes').innerHTML=html;
}

function renderTri(){
  const done=Object.values(sortDone).filter(Boolean).length;
  const pct=Math.round(done/sortZones.length*100);
  const PC={1:{bg:'rgba(240,112,80,0.15)',color:'#f5a08a',label:'Phase 1 — Déblayer'},2:{bg:'rgba(96,165,250,0.15)',color:'#93c5fd',label:'Phase 2 — Catégories'},3:{bg:'rgba(168,156,248,0.15)',color:'#c4b5fd',label:'Phase 3 — Ancrer'}};
  let html=`<div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Zones triées</div><div class="stat-num" style="color:var(--coral-l)">${done}/${sortZones.length}</div></div>
    <div class="stat"><div class="stat-lbl">Progression</div><div class="stat-num">${pct}%</div></div>
  </div>
  <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--coral),var(--amber));"></div></div>
  <div class="prog-lbl" style="margin-bottom:16px;">Désencombrement 8 semaines</div>`;
  const weeks={};
  sortZones.forEach(z=>{if(!weeks[z.week])weeks[z.week]=[];weeks[z.week].push(z);});
  [1,2,3,4,5,6,7,8].forEach(w=>{
    if(!weeks[w])return;
    const ph=weeks[w][0].phase;
    const pc=PC[ph];
    html+=`<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <span class="phase-badge" style="background:${pc.bg};color:${pc.color};">${pc.label}</span>
      <span style="font-size:12px;color:var(--text2);">Semaine ${w}</span>
    </div>`;
    weeks[w].forEach(z=>{
      const isDone=!!sortDone[z.id];
      html+=`<div class="task-row${isDone?' done':''}" onclick="window.toggleSort('${z.id}')">
        <div class="check${isDone?' on':''}" style="${isDone?'background:'+pc.color+';':''}">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="task-text">${z.name}</div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('tab-tri').innerHTML=html;
}

function renderEdit(){
  let html=`<div style="font-size:12px;color:var(--text2);margin-bottom:12px;"><span class="online-dot"></span>Les modifications sont synchronisées pour toute la famille.</div>`;
  html+=`<div class="card">`;
  tasks.forEach(t=>{
    html+=`<div class="edit-row">
      <div style="width:8px;height:8px;border-radius:50%;background:${TYPE_COLORS[t.type]};flex-shrink:0;margin-top:4px;"></div>
      <input value="${t.text}" onchange="window.updateTask(${t.id},'text',this.value)">
      <select onchange="window.updateTask(${t.id},'who',this.value)">
        ${PEOPLE.map(p=>`<option value="${p.id}"${p.id===t.who?' selected':''}>${p.name}</option>`).join('')}
      </select>
      <button class="btn-del" onclick="window.delTask(${t.id})">×</button>
    </div>`;
  });
  html+=`</div>
  <div class="add-section">
    <h3>+ Nouvelle tâche</h3>
    <div class="form-row"><label>Description</label><input id="new-text" placeholder="Ex: Passer l'aspirateur..."></div>
    <div class="form-row"><label>Assigné à</label><select id="new-who">${PEOPLE.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
    <div class="form-row"><label>Type</label><select id="new-type">
      <option value="instant">Geste immédiat</option>
      <option value="weekly">Régulier</option>
      <option value="deep">Nettoyage profond</option>
      <option value="sort">Tri</option>
    </select></div>
    <div class="form-row"><label>Jours</label>
      <div class="days-grid">${DAYS.map(d=>`<button class="day-toggle" data-day="${d}" onclick="window.toggleDay('${d}',this)">${d}</button>`).join('')}</div>
    </div>
    <button class="btn-submit" onclick="window.addTask()">Ajouter la tâche</button>
  </div>`;
  document.getElementById('tab-edit').innerHTML=html;
}

window.toggle = function(key){
  const val = !checked[key];
  checked[key]=val;
  syncChecked(key, val);
  renderCurrent();
};
window.toggleSort = function(id){
  const val=!sortDone[id];
  sortDone[id]=val;
  syncSortDone(id,val);
  renderTri();
};
window.setVP = function(id){viewPerson=id;renderPersonnes();};
window.updateTask = function(id,field,val){
  const t=tasks.find(t=>t.id===id);
  if(t){t[field]=val;syncTasks();}
};
window.delTask = function(id){
  tasks=tasks.filter(t=>t.id!==id);
  syncTasks();
  renderEdit();renderCurrent();
};
window.toggleDay = function(day,el){
  el.classList.toggle('on');
  if(el.classList.contains('on')){if(!selectedDays.includes(day))selectedDays.push(day);}
  else{selectedDays=selectedDays.filter(d=>d!==day);}
};
window.addTask = function(){
  const text=document.getElementById('new-text').value.trim();
  const who=document.getElementById('new-who').value;
  const type=document.getElementById('new-type').value;
  if(!text||!selectedDays.length){alert('Remplis tous les champs et sélectionne au moins un jour.');return;}
  tasks.push({id:Date.now(),text,who,type,days:[...selectedDays]});
  syncTasks();
  selectedDays=[];
  renderEdit();renderCurrent();
};

window.goTab = function(name){
  currentTab=name;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.navbtn').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';});
  document.querySelectorAll('.bnav').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  const nb=document.getElementById('nav-'+name);
  nb.classList.add('on');
  nb.style.background=NAV_COLORS[name];
  nb.style.color='#fff';
  nb.style.borderColor='transparent';
  document.getElementById('bn-'+name).classList.add('on');
  if(name==='aujourd')renderToday();
  else if(name==='semaine')renderSemaine();
  else if(name==='personnes')renderPersonnes();
  else if(name==='tri')renderTri();
  else if(name==='edit')renderEdit();
};

const days=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const months=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const now=new Date();
document.getElementById('topdate').textContent=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()];

document.getElementById('nav-aujourd').style.background=NAV_COLORS['aujourd'];
document.getElementById('nav-aujourd').style.color='#fff';
document.getElementById('nav-aujourd').style.borderColor='transparent';
renderToday();
</script>
</body>
</html>
